<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
    <!-- Only root can own the service -->
    <policy user="root">
        <allow own="org.vantagex.daemon"/>
        <allow send_destination="org.vantagex.daemon"/>
    </policy>

    <!-- Allow users in the wheel group to interact with the daemon -->
    <policy group="wheel">
        <allow send_destination="org.vantagex.daemon"/>
        <allow receive_sender="org.vantagex.daemon"/>
    </policy>

    <!-- Allow any user in the current seat to interact with the daemon -->
    <policy context="default">
        <allow send_destination="org.vantagex.daemon"/>
        <allow receive_sender="org.vantagex.daemon"/>
    </policy>
</busconfig>
